name: OpenCode - 项目管理

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:

  # ══════════════════════════════════════════
  # Job 1：新建 或 改进已有项目（Issue 评论触发）
  # ══════════════════════════════════════════
  create-or-improve-project:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      (contains(github.event.comment.body, '/opencode') ||
       contains(github.event.comment.body, '/oc')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      # 动态生成 opencode.json，从 GitHub Variables/Secrets 读取配置
      # OPENCODE_BASE_URL: GitHub Variable，例如 https://api.siliconflow.cn/v1
      # OPENCODE_MODEL:    GitHub Variable，例如 Pro/zai-org/GLM-5
      # OPENCODE_API_KEY:  GitHub Secret
      - name: Configure OpenCode provider
        uses: actions/github-script@v8
        env:
          OPENCODE_BASE_URL: ${{ vars.OPENCODE_BASE_URL }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
        with:
          script: |
            const fs    = require('fs');
            const model = process.env.OPENCODE_MODEL;
            const lower = model.toLowerCase();
            const npm   = lower.includes('claude') ? '@ai-sdk/anthropic'
                        : lower.includes('gpt')    ? '@ai-sdk/openai'
                        :                            '@ai-sdk/openai-compatible';
            const config = {
              "$schema": "https://opencode.ai/config.json",
              "provider": {
                "custom": {
                  "npm": npm,
                  "name": "Custom Provider",
                  "options": {
                    "baseURL": process.env.OPENCODE_BASE_URL,
                    "apiKey": "{env:OPENCODE_API_KEY}"
                  },
                  "models": {
                    [model]: { "name": model }
                  }
                }
              }
            };
            fs.writeFileSync('opencode.json', JSON.stringify(config, null, 2));
            console.log(`npm: ${npm}, model: ${model}, baseURL: ${process.env.OPENCODE_BASE_URL}`);

      # 判断是「新建」还是「改进已有项目」
      - name: Setup project structure
        id: setup
        uses: actions/github-script@v8
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const issue    = context.payload.issue;
            const title    = issue.title;
            const body     = issue.body || 'No description provided.';
            const issueNum = issue.number;
            const issueUrl = issue.html_url;
            const author   = issue.user.login;

            const refMatch = title.match(/^\[?(prj-\d{8}-[a-z0-9-]+)\]?/i);

            let projectName;
            let mode;

            if (refMatch && fs.existsSync(refMatch[1])) {
              projectName = refMatch[1];
              mode = 'improve';
              console.log(`Improve mode: reusing existing directory ${projectName}`);

              const appendContent = [
                '',
                `---`,
                '',
                `## Improvement Request — Issue #${issueNum}`,
                `> [${issueUrl}](${issueUrl}) by @${author} on ${new Date().toISOString().slice(0, 10)}`,
                '',
                body,
              ].join('\n');
              fs.appendFileSync(path.join(projectName, 'REQUIREMENTS.md'), appendContent, 'utf8');

            } else {
              const slug = title
                .replace(/^\[.*?\]\s*/, '')
                .replace(/[\u4e00-\u9fff\u3040-\u30ff\uAC00-\uD7AF]+/g, 'cn')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .substring(0, 40) || 'project';

              const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
              projectName = `prj-${dateStr}-${slug}`;
              mode = 'create';
              console.log(`Create mode: new directory ${projectName}`);

              fs.mkdirSync(projectName, { recursive: true });

              const requirements = [
                `# ${title}`,
                '',
                `> **Issue**: [#${issueNum}](${issueUrl})`,
                `> **Author**: @${author}`,
                `> **Date**: ${new Date().toISOString().slice(0, 10)}`,
                '',
                '## Requirements',
                '',
                body,
              ].join('\n');

              fs.writeFileSync(path.join(projectName, 'REQUIREMENTS.md'), requirements, 'utf8');
            }

            core.setOutput('project_name', projectName);
            core.setOutput('issue_number', String(issueNum));
            core.setOutput('issue_title',  title);
            core.setOutput('mode', mode);

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: custom/${{ vars.OPENCODE_MODEL }}
          prompt: |
            ${{ steps.setup.outputs.mode == 'improve' && '## Improvement Task' || '## New Project Task' }}

            Working directory: `${{ steps.setup.outputs.project_name }}/`
            Issue: #${{ steps.setup.outputs.issue_number }} — ${{ steps.setup.outputs.issue_title }}

            Read `${{ steps.setup.outputs.project_name }}/REQUIREMENTS.md` for full context.

            ${{ steps.setup.outputs.mode == 'improve' && 'The latest improvement request is appended at the bottom of REQUIREMENTS.md. Apply the requested changes to the existing code.' || 'Implement the complete project from scratch.' }}

            Steps to follow:
            1. Read `${{ steps.setup.outputs.project_name }}/REQUIREMENTS.md`
            2. ${{ steps.setup.outputs.mode == 'improve' && 'Identify the improvement request and make the necessary code changes inside `${{ steps.setup.outputs.project_name }}/`' || 'Implement the full project inside `${{ steps.setup.outputs.project_name }}/`' }}
            3. Write or update tests — all tests must pass
            4. Create a pull request:
               - Title: `${{ steps.setup.outputs.mode == 'improve' && format('improve({0}): {1}', steps.setup.outputs.project_name, steps.setup.outputs.issue_title) || format('feat({0}): {1}', steps.setup.outputs.project_name, steps.setup.outputs.issue_title) }}`
               - Body: closes #${{ steps.setup.outputs.issue_number }}

            Do NOT modify files outside `${{ steps.setup.outputs.project_name }}/`.

  # ══════════════════════════════════════════
  # Job 2：修复 PR 中的代码问题
  # ══════════════════════════════════════════
  fix-pr:
    if: |
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)) &&
      (contains(github.event.comment.body, '/opencode') ||
       contains(github.event.comment.body, '/oc')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure OpenCode provider
        uses: actions/github-script@v8
        env:
          OPENCODE_BASE_URL: ${{ vars.OPENCODE_BASE_URL }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
        with:
          script: |
            const fs    = require('fs');
            const model = process.env.OPENCODE_MODEL;
            const config = {
              "$schema": "https://opencode.ai/config.json",
              "provider": {
                "custom": {
                  "npm": "@ai-sdk/openai-compatible",
                  "name": "Custom Provider",
                  "options": {
                    "baseURL": process.env.OPENCODE_BASE_URL,
                    "apiKey": "{env:OPENCODE_API_KEY}"
                  },
                  "models": {
                    [model]: { "name": model }
                  }
                }
              }
            };
            fs.writeFileSync('opencode.json', JSON.stringify(config, null, 2));

      - name: Run OpenCode to fix PR
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: custom/${{ vars.OPENCODE_MODEL }}
